dataset: "phoenixT"
work_dir: "/home/caffe/work/SLG/"
device: "cuda:0"
dataset_parameters:
  use_phoenixT: True
  use_how2sign: False
  use_csl-daily: False
lr_parameters:
  epoch: 100
  learning_rate : 0.0005
  min_lr: 0
  weight_decay: 0.01
  milestones: [200,320]
  gamma: 0.2
  dropout: 0.3
  amp: True
  display_step: 20
  accumulation_step: 1
  batch_size: 16
  scheduler_timing: "epoch"
  scheduler_type: "CosineAnnealingLR"
  grad_clip_norm: 1.0
  ema: False
  ema_beta: 0.999
loss_parameters:
    pose_loss_weight: 1.0
    stop_loss_weight: 0.0
    bone_loss_weight: 0.0
    velocity_loss_weight: 0.1
    max_length: 300
    pose_weights: 0.1
    hand_weights: 0.9

model:
  pose_dim: 96
  text_encoder_name: "openai/clip-vit-base-patch32"
  text_encoder_requires_grad: False
  text_adapter: True
  hidden_dim: 128
  pose_hidden_dim: 128
  hand_hidden_dim: 128
  extra_hidden_dim: 64
  ffn_mult: 4
  num_heads: 4
  dropout: 0.3
  num_layers: 2
  activation: "gelu"
  trainable: True
